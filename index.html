<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚖️ МЕГА-СПРАВОЧНИК | RP-Проект</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0f1419;
    --bg-2: #1a2029;
    --bg-3: #232a36;
    --border: #2d3542;
    --text: #e4e6eb;
    --text-dim: #8b95a7;
    --accent: #4a9eff;
    --green: #2ecc71;
    --red: #e74c3c;
    --yellow: #f1c40f;
    --purple: #9b59b6;
  }
  body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 40px;
  }
  header {
    background: linear-gradient(135deg, #1a2029, #2d3542);
    border-bottom: 2px solid var(--accent);
    padding: 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  .header-inner {
    max-width: 1400px;
    margin: 0 auto;
  }
  h1 {
    font-size: 24px;
    margin-bottom: 15px;
    color: var(--accent);
  }
  h1 small { color: var(--text-dim); font-weight: normal; font-size: 14px; margin-left: 10px; }
  .search-box {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
  }
  .search-box input {
    flex: 1;
    padding: 12px 16px;
    background: var(--bg-3);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 15px;
    outline: none;
    transition: all 0.2s;
  }
  .search-box input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(74,158,255,0.2);
  }
  .mode-switch {
    display: flex;
    gap: 8px;
  }
  .mode-btn {
    padding: 12px 18px;
    background: var(--bg-3);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 14px;
    transition: all 0.2s;
  }
  .mode-btn.active, .mode-btn:hover {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  .factions-nav {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .faction-btn {
    padding: 10px 16px;
    background: var(--bg-3);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s;
  }
  .faction-btn:hover {
    background: var(--bg-2);
    transform: translateY(-2px);
  }
  .faction-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  main {
    max-width: 1400px;
    margin: 20px auto;
    padding: 0 20px;
  }
  .tabs {
    display: flex;
    gap: 4px;
    border-bottom: 2px solid var(--border);
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .tab {
    padding: 10px 18px;
    background: transparent;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 14px;
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
  }
  .tab:hover { color: var(--text); }
  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  .content-section { display: none; }
  .content-section.active { display: block; animation: fadeIn 0.3s; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
    margin-bottom: 15px;
  }
  .card h3 {
    color: var(--accent);
    margin-bottom: 12px;
    font-size: 17px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card ul { list-style: none; padding-left: 0; }
  .card li {
    padding: 8px 0;
    padding-left: 20px;
    position: relative;
    border-bottom: 1px solid var(--border);
  }
  .card li:last-child { border-bottom: none; }
  .card li::before {
    content: "▸";
    position: absolute;
    left: 0;
    color: var(--accent);
  }
  .law-table {
    width: 100%;
    border-collapse: collapse;
    background: var(--bg-2);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 15px;
  }
  .law-table th {
    background: var(--bg-3);
    padding: 12px;
    text-align: left;
    color: var(--accent);
    font-weight: 600;
    border-bottom: 2px solid var(--border);
  }
  .law-table td {
    padding: 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  .law-table tr:hover { background: var(--bg-3); }
  .law-tag {
    display: inline-block;
    padding: 3px 8px;
    background: var(--bg-3);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 12px;
    font-family: 'Consolas', monospace;
    color: var(--accent);
    margin-right: 4px;
  }
  .status-badge {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 600;
    margin-right: 4px;
  }
  .status-green { background: rgba(46,204,113,0.2); color: var(--green); border: 1px solid var(--green); }
  .status-red { background: rgba(231,76,60,0.2); color: var(--red); border: 1px solid var(--red); }
  .status-yellow { background: rgba(241,196,15,0.2); color: var(--yellow); border: 1px solid var(--yellow); }
  .error-card {
    background: linear-gradient(135deg, rgba(231,76,60,0.1), rgba(231,76,60,0.05));
    border-left: 4px solid var(--red);
    padding: 14px 18px;
    margin-bottom: 10px;
    border-radius: 6px;
  }
  .error-card strong { color: var(--red); }
  .warn-card {
    background: linear-gradient(135deg, rgba(241,196,15,0.1), rgba(241,196,15,0.05));
    border-left: 4px solid var(--yellow);
    padding: 14px 18px;
    margin-bottom: 10px;
    border-radius: 6px;
  }
  .warn-card strong { color: var(--yellow); }
  .ok-card {
    background: linear-gradient(135deg, rgba(46,204,113,0.1), rgba(46,204,113,0.05));
    border-left: 4px solid var(--green);
    padding: 14px 18px;
    margin-bottom: 10px;
    border-radius: 6px;
  }
  .ok-card strong { color: var(--green); }
  .blank-card {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 15px;
    overflow: hidden;
    transition: all 0.2s;
  }
  .blank-card:hover { border-color: var(--accent); }
  .blank-header {
    padding: 14px 18px;
    background: var(--bg-3);
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .blank-header h4 { color: var(--text); font-size: 15px; }
  .blank-status {
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
  }
  .status-green-bg { background: var(--green); color: white; }
  .status-yellow-bg { background: var(--yellow); color: #000; }
  .status-red-bg { background: var(--red); color: white; }
  .blank-body {
    padding: 18px;
    display: none;
  }
  .blank-body.open { display: block; }
  .blank-form {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 15px;
  }
  .blank-form .full { grid-column: 1 / -1; }
  .blank-form label {
    display: block;
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }
  .blank-form input, .blank-form select, .blank-form textarea {
    width: 100%;
    padding: 8px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 14px;
    outline: none;
  }
  .blank-form input:focus, .blank-form select:focus, .blank-form textarea:focus {
    border-color: var(--accent);
  }
  .blank-preview {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px;
    font-family: 'Consolas', 'Courier New', monospace;
    font-size: 13px;
    white-space: pre-wrap;
    line-height: 1.5;
    margin-bottom: 10px;
    max-height: 400px;
    overflow-y: auto;
  }
  .btn {
    padding: 10px 18px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    transition: all 0.2s;
    margin-right: 8px;
    margin-bottom: 8px;
  }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: #3a8ee6; }
  .btn-secondary { background: var(--bg-3); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--border); }
  .btn-copy { background: var(--green); color: white; }
  .btn-copy:hover { background: #27ae60; }
  .cross-link {
    display: inline-block;
    padding: 4px 10px;
    background: var(--bg-3);
    border: 1px dashed var(--accent);
    border-radius: 4px;
    font-size: 12px;
    color: var(--accent);
    text-decoration: none;
    margin-top: 8px;
    cursor: pointer;
  }
  .cross-link:hover { background: var(--accent); color: white; }
  .checklist {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 15px;
    margin-bottom: 12px;
  }
  .checklist h4 {
    color: var(--green);
    margin-bottom: 10px;
    font-size: 15px;
  }
  .check-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }
  .check-item:last-child { border-bottom: none; }
  .check-item input[type="checkbox"] {
    margin-top: 3px;
    width: 18px;
    height: 18px;
    cursor: pointer;
  }
  .check-item.checked label {
    text-decoration: line-through;
    color: var(--text-dim);
  }
  .hierarchy {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 15px;
    font-family: 'Consolas', monospace;
    font-size: 13px;
    white-space: pre-wrap;
    line-height: 1.4;
    margin-bottom: 15px;
  }
  .filters-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .filter-chip {
    padding: 6px 14px;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
  }
  .filter-chip.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  footer {
    max-width: 1400px;
    margin: 40px auto 20px;
    padding: 20px;
    text-align: center;
    color: var(--text-dim);
    font-size: 13px;
    border-top: 1px solid var(--border);
  }
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }
  .empty-state h3 { margin-bottom: 10px; color: var(--text); }
  .copy-toast {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: var(--green);
    color: white;
    padding: 12px 24px;
    border-radius: 8px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.3s;
    z-index: 1000;
    pointer-events: none;
  }
  .copy-toast.show {
    opacity: 1;
    transform: translateY(0);
  }
  .highlight { background: rgba(241,196,15,0.3); padding: 0 2px; border-radius: 2px; }
  .section-title {
    font-size: 20px;
    color: var(--accent);
    margin-bottom: 15px;
    padding-bottom: 10px;
    border-bottom: 2px solid var(--border);
  }
  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
  }
  @media (max-width: 768px) {
    .grid-2 { grid-template-columns: 1fr; }
    .blank-form { grid-template-columns: 1fr; }
    h1 { font-size: 18px; }
    .faction-btn { padding: 8px 12px; font-size: 12px; }
  }
  .info-banner {
    background: linear-gradient(135deg, rgba(74,158,255,0.1), rgba(155,89,182,0.1));
    border: 1px solid var(--accent);
    border-radius: 10px;
    padding: 18px;
    margin-bottom: 20px;
  }
  .info-banner h2 {
    color: var(--accent);
    margin-bottom: 10px;
    font-size: 18px;
  }
</style>
</head>

// ============ UI ============

const factionsNav = document.getElementById('factionsNav');
const tabsNav = document.getElementById('tabsNav');
const tabContent = document.getElementById('tabContent');
const mainContent = document.getElementById('mainContent');
const searchResults = document.getElementById('searchResults');
const globalSearch = document.getElementById('globalSearch');
const copyToast = document.getElementById('copyToast');

let currentFaction = 'army';
let currentTab = 'structure';

// Навигация по фракциям
Object.values(FACTIONS).forEach((f, i) => {
  const btn = document.createElement('button');
  btn.className = 'faction-btn' + (i === 0 ? ' active' : '');
  btn.dataset.faction = f.id;
  btn.innerHTML = `<span>${f.icon}</span><span>${f.name}</span>`;
  btn.onclick = () => selectFaction(f.id);
  factionsNav.appendChild(btn);
});

function selectFaction(id) {
  currentFaction = id;
  currentTab = 'structure';
  document.querySelectorAll('.faction-btn').forEach(b => b.classList.toggle('active', b.dataset.faction === id));
  renderTabs();
  renderTab();
  searchResults.innerHTML = '';
  globalSearch.value = '';
}

// Вкладки
const TABS = [
  { id: 'structure', name: '🏢 Структура' },
  { id: 'laws', name: '📜 Законы' },
  { id: 'powers', name: '⚖️ Полномочия' },
  { id: 'restrictions', name: '🚫 Ограничения' },
  { id: 'algorithms', name: '📋 Алгоритмы' },
  { id: 'checklists', name: '✅ Требования' },
  { id: 'errors', name: '⚠️ Ошибки' },
  { id: 'interactions', name: '🤝 Взаимодействие' },
  { id: 'blanks', name: '📑 Бланки' }
];

function renderTabs() {
  tabsNav.innerHTML = '';
  TABS.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (t.id === currentTab ? ' active' : '');
    btn.textContent = t.name;
    btn.onclick = () => {
      currentTab = t.id;
      document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderTab();
    };
    tabsNav.appendChild(btn);
  });
}

function renderTab() {
  const f = FACTIONS[currentFaction];
  let html = '';
  
  if (currentTab === 'structure') {
    html = `
      <div class="section-title">🏢 ${f.name} — Структура</div>
      <div class="info-banner">
        <h2>${f.icon} ${f.name}</h2>
        <p>Иерархия подразделений и командования</p>
      </div>
      <div class="hierarchy">${f.structure.text}</div>
    `;
  } else if (currentTab === 'laws') {
    html = `<div class="section-title">📜 Правовая база — ${f.name}</div>
      <table class="law-table">
        <thead><tr><th>Номер</th><th>Название</th><th>Дата</th></tr></thead>
        <tbody>`;
    f.laws.forEach(l => {
      html += `<tr>
        <td><span class="law-tag">${l.num}</span></td>
        <td>${l.name}</td>
        <td style="color:var(--text-dim)">${l.date}</td>
      </tr>`;
    });
    html += `</tbody></table>`;
  } else if (currentTab === 'powers') {
    html = `<div class="section-title">⚖️ Полномочия — ${f.name}</div>
      <div class="card">
        <h3>Что имеет право делать сотрудник</h3>
        <ul>`;
    f.powers.forEach(p => {
      const cls = p.status === 'green' ? 'status-green' : p.status === 'red' ? 'status-red' : 'status-yellow';
      const txt = p.status === 'green' ? 'Разрешено' : p.status === 'red' ? 'Исключительный случай' : 'Требуется решение суда';
      html += `<li>${p.text} <span class="status-badge ${cls}">${txt}</span></li>`;
    });
    html += `</ul></div>`;
  } else if (currentTab === 'restrictions') {
    html = `<div class="section-title">🚫 Ограничения — ${f.name}</div>`;
    f.restrictions.forEach(r => {
      html += `<div class="error-card"><strong>❌ ${r}</strong></div>`;
    });
  } else if (currentTab === 'algorithms') {
    html = `<div class="section-title">📋 Алгоритмы действий — ${f.name}</div>`;
    Object.entries(f.algorithms).forEach(([name, steps]) => {
      html += `<div class="card"><h3>${name}</h3><ol style="padding-left:20px">`;
      steps.forEach(s => html += `<li style="padding:5px 0">${s}</li>`);
      html += `</ol></div>`;
    });
  } else if (currentTab === 'checklists') {
    html = `<div class="section-title">✅ Требования — ${f.name}</div>`;
    f.checklists.forEach((cl, idx) => {
      html += `<div class="checklist"><h4>${cl.title}</h4>`;
      cl.items.forEach((item, i) => {
        const key = `${currentFaction}_${idx}_${i}`;
        const checked = localStorage.getItem('check_' + key) === '1';
        html += `<div class="check-item ${checked ? 'checked' : ''}">
          <input type="checkbox" id="check_${key}" ${checked ? 'checked' : ''} onchange="toggleCheck('${key}', this)">
          <label for="check_${key}">${item}</label>
        </div>`;
      });
      html += `</div>`;
    });
  } else if (currentTab === 'errors') {
    html = `<div class="section-title">⚠️ Типичные ошибки — ${f.name}</div>`;
    f.errors.forEach(e => {
      html += `<div class="error-card"><strong>❌ ${e.text}</strong></div>`;
    });
  } else if (currentTab === 'interactions') {
    html = `<div class="section-title">🤝 Взаимодействие — ${f.name}</div>
      <div class="grid-2">`;
    f.interactions.forEach(i => {
      const targetFaction = Object.values(FACTIONS).find(f => f.name.toLowerCase().includes(i.target.toLowerCase()));
      html += `<div class="card">
        <h3>${targetFaction ? targetFaction.icon : '🏢'} ${i.target}</h3>
        <p>${i.reason}</p>
        <a class="cross-link" onclick="${targetFaction ? `selectFaction('${targetFaction.id}')` : ''}">Перейти →</a>
      </div>`;
    });
    html += `</div>`;
  } else if (currentTab === 'blanks') {
    html = `<div class="section-title">📑 Процессуальные бланки — ${f.name}</div>`;
    f.blanks.forEach(bId => {
      const b = BLANKS[bId];
      const statusCls = b.status === 'green' ? 'status-green-bg' : b.status === 'red' ? 'status-red-bg' : 'status-yellow-bg';
      const statusTxt = b.status === 'green' ? 'Самостоятельно' : b.status === 'red' ? 'Решение суда' : 'Руководитель';
      html += `<div class="blank-card">
        <div class="blank-header" onclick="toggleBlank(${bId})">
          <h4>📋 ${b.title}</h4>
          <span class="blank-status ${statusCls}">${statusTxt}</span>
        </div>
        <div class="blank-body" id="blank_body_${bId}">
          <div class="blank-form">`;
      b.fields.forEach(field => {
        html += `<div><label>${getFieldLabel(field)}</label><input type="text" id="field_${bId}_${field}" placeholder="..." oninput="updateBlankPreview(${bId})"></div>`;
      });
      html += `</div>
          <div class="blank-preview" id="preview_${bId}">${renderTemplate(b.template, bId)}</div>
          <button class="btn btn-copy" onclick="copyBlank(${bId})">📋 Скопировать в буфер</button>
          <button class="btn btn-secondary" onclick="clearBlank(${bId})">🗑 Очистить</button>
        </div>
      </div>`;
    });
  }
  
  tabContent.innerHTML = html;
}

  const labels = {
    nomer: 'Номер', sutmrm: 'Суть ОРМ', fio: 'ФИО', osnov: 'Основание',
    number: 'Номер телефона', srok: 'Срок (суток)', statya: 'Статья УК',
    podr: 'Подразделение / должность', nazv: 'Название ОРМ', data: 'Дата',
    adres: 'Адрес', datavremya: 'Дата и время', status: 'Статус (свидетель/подозреваемый)',
    vremya: 'Время', mesto: 'Место', sotr: 'Сотрудник (звание, ФИО)',
    spisok: 'Список изъятых предметов', opisanie: 'Описание', ponyatye: 'Понятые (ФИО)',
    sudya: 'Судья', adresat: 'Адресат', narush: 'Описание нарушений',
    reestr: 'Реестровый номер', doveritel: 'Доверитель', perechen: 'Перечень',
    sud: 'Название суда', fio_sled: 'ФИО следователя', deystvie: 'Действие',
    komandir: 'Командир части', zvaniye: 'Звание', narush: 'Нарушение',
    zashch: 'Подзащитный', primenen: 'Что применено', rezultat: 'Результат',
    otkuda: 'Откуда', kamera: 'Камера', izyato: 'Изъято'

  return labels[f] || f;

function toggleBlank(id) {
  const body = document.getElementById('blank_body_' + id);
  body.classList.toggle('open');
}

function renderTemplate(template, bId) {
  let result = template;
  const b = BLANKS[bId];
  b.fields.forEach(f => {
    const input = document.getElementById(`field_${bId}_${f}`);
    const val = input ? input.value || `[${getFieldLabel(f)}]` : `[${getFieldLabel(f)}]`;
    result = result.replace(new RegExp(`\\{\\{${f}\\}\\}`, 'g'), val);
  });
  return result;
}

function updateBlankPreview(bId) {
  const preview = document.getElementById('preview_' + bId);
  preview.textContent = renderTemplate(BLANKS[bId].template, bId);
}

function copyBlank(bId) {
  const preview = document.getElementById('preview_' + bId);
  navigator.clipboard.writeText(preview.textContent).then(() => {
    showToast('✅ Текст скопирован в буфер обмена!');
  });
}

function clearBlank(bId) {
  const b = BLANKS[bId];
  b.fields.forEach(f => {
    const input = document.getElementById(`field_${bId}_${f}`);
    if (input) input.value = '';
  });
  updateBlankPreview(bId);
}

function toggleCheck(key, cb) {
  if (cb.checked) localStorage.setItem('check_' + key, '1');
  else localStorage.removeItem('check_' + key);
  cb.parentElement.classList.toggle('checked', cb.checked);
}

function showToast(msg) {
  copyToast.textContent = msg;
  copyToast.classList.add('show');
  setTimeout(() => copyToast.classList.remove('show'), 2500);
}

// Глобальный поиск
globalSearch.addEventListener('input', (e) => {
  const q = e.target.value.toLowerCase().trim();
  if (!q) {
    searchResults.innerHTML = '';
    mainContent.style.display = 'block';
    return;
  }
  mainContent.style.display = 'none';
  let results = [];
  
  // Поиск по фракциям
  Object.values(FACTIONS).forEach(f => {
    if (f.name.toLowerCase().includes(q)) {
      results.push({ type: 'faction', faction: f, text: `Фракция: ${f.name}` });
    }
    // По законам
    f.laws.forEach(l => {
      if ((l.num + ' ' + l.name).toLowerCase().includes(q)) {
        results.push({ type: 'law', faction: f, law: l, text: `${l.num} ${l.name}` });
      }
    });
    // По полномочиям
    f.powers.forEach(p => {
      if (p.text.toLowerCase().includes(q)) {
        results.push({ type: 'power', faction: f, text: p.text });
      }
    });
    // По ошибкам
    f.errors.forEach(e => {
      if (e.text.toLowerCase().includes(q)) {
        results.push({ type: 'error', faction: f, text: e.text });
      }
    });
  });
  
  // Поиск по бланкам
  Object.entries(BLANKS).forEach(([id, b]) => {
    if (b.title.toLowerCase().includes(q) || b.template.toLowerCase().includes(q)) {
      const faction = Object.values(FACTIONS).find(f => f.blanks.includes(parseInt(id)));
      results.push({ type: 'blank', blank: b, id, faction, text: `Бланк: ${b.title}` });
    }
  });
  
  if (results.length === 0) {
    searchResults.innerHTML = `<div class="empty-state"><h3>🔍 Ничего не найдено</h3><p>Попробуйте изменить запрос</p></div>`;
    return;
  }
  
  let html = `<div class="section-title">🔍 Результаты поиска: "${e.target.value}" (${results.length})</div>`;
  results.forEach(r => {
    if (r.type === 'faction') {
      html += `<div class="card" style="cursor:pointer" onclick="selectFaction('${r.faction.id}')">
        <h3>${r.faction.icon} ${r.faction.name}</h3>
        <p style="color:var(--text-dim)">Перейти к фракции →</p>
      </div>`;
    } else if (r.type === 'law') {
      html += `<div class="card" style="cursor:pointer" onclick="selectFaction('${r.faction.id}'); currentTab='laws'; renderTabs(); renderTab();">
        <h3>📜 ${r.law.num} — ${r.law.name}</h3>
        <p style="color:var(--text-dim)">Фракция: ${r.faction.icon} ${r.faction.name} ${r.law.date ? '| ' + r.law.date : ''}</p>
      </div>`;
    } else if (r.type === 'power') {
      html += `<div class="card" style="cursor:pointer" onclick="selectFaction('${r.faction.id}'); currentTab='powers'; renderTabs(); renderTab();">
        <h3>⚖️ ${highlightText(r.text, q)}</h3>
        <p style="color:var(--text-dim)">${r.faction.icon} ${r.faction.name}</p>
      </div>`;
    } else if (r.type === 'error') {
      html += `<div class="error-card" style="cursor:pointer" onclick="selectFaction('${r.faction.id}'); currentTab='errors'; renderTabs(); renderTab();">
        <strong>❌ ${highlightText(r.text, q)}</strong>
        <p style="color:var(--text-dim); margin-top:5px">${r.faction.icon} ${r.faction.name}</p>
      </div>`;
    } else if (r.type === 'blank') {
      html += `<div class="card" style="cursor:pointer" onclick="selectFaction('${r.faction.id}'); currentTab='blanks'; renderTabs(); renderTab(); setTimeout(()=>{const body=document.getElementById('blank_body_${r.id}'); if(body) body.classList.add('open');},100)">
        <h3>📋 ${highlightText(r.blank.title, q)}</h3>
        <p style="color:var(--text-dim)">${r.faction.icon} ${r.faction.name}</p>
      </div>`;
    }
  });
  searchResults.innerHTML = html;
});

function highlightText(text, q) {
  const regex = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
  return text.replace(regex, '<span class="highlight">$1</span>');
}
