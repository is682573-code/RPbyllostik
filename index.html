<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚖️ СПРАВОЧНИК | Полная версия</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0f1419;
    --bg-2: #161b22;
    --bg-3: #21262d;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --accent: #f78166;
    --green: #7ee787;
    --red: #f85149;
    --yellow: #ffc107;
    --blue: #79c0ff;
    --purple: #d2a8ff;
  }
  body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: linear-gradient(135deg, #0f1419 0%, #1a1f2e 100%);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 40px;
    line-height: 1.6;
  }
  header {
    background: rgba(22, 27, 34, 0.95);
    border-bottom: 2px solid var(--accent);
    padding: 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  .header-inner { max-width: 1400px; margin: 0 auto; }
  h1 {
    font-size: 24px;
    margin-bottom: 15px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 2px;
    text-shadow: 0 0 20px rgba(247, 129, 102, 0.3);
  }
  h1 small { color: var(--text-dim); font-weight: normal; font-size: 13px; margin-left: 10px; text-transform: none; letter-spacing: 0; }
  .search-box { display: flex; gap: 10px; margin-bottom: 15px; }
  .search-box input {
    flex: 1;
    padding: 14px 20px;
    background: var(--bg-2);
    border: 2px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 15px;
    outline: none;
    transition: all 0.3s;
  }
  .search-box input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(247, 129, 102, 0.1);
  }
  .mode-switch { display: flex; gap: 6px; }
  .mode-btn {
    padding: 12px 16px;
    background: var(--bg-3);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
  }
  .mode-btn.active, .mode-btn:hover {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  .factions-nav { display: flex; gap: 6px; flex-wrap: wrap; }
  .faction-btn {
    padding: 9px 14px;
    background: var(--bg-3);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    cursor: pointer;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: all 0.2s;
  }
  .faction-btn:hover { background: var(--bg-2); transform: translateY(-2px); }
  .faction-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
    box-shadow: 0 4px 12px rgba(247, 129, 102, 0.3);
  }
  main { max-width: 1400px; margin: 20px auto; padding: 0 20px; }
  .tabs {
    display: flex;
    gap: 4px;
    border-bottom: 2px solid var(--border);
    margin-bottom: 20px;
    flex-wrap: wrap;
    padding-bottom: 8px;
  }
  .tab {
    padding: 10px 16px;
    background: transparent;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
    border-radius: 8px 8px 0 0;
  }
  .tab:hover { color: var(--text); background: rgba(247, 129, 102, 0.05); }
  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    background: rgba(247, 129, 102, 0.05);
  }
  .content-section { display: none; }
  .content-section.active { display: block; animation: fadeIn 0.3s; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 18px;
    margin-bottom: 25px;
  }
  .card {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 22px;
    transition: all 0.3s;
  }
  .card:hover {
    transform: translateY(-3px);
    border-color: var(--accent);
    box-shadow: 0 10px 28px rgba(247, 129, 102, 0.15);
  }
  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 14px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
    gap: 10px;
  }
  .card-title {
    font-size: 1.05em;
    font-weight: 700;
    color: var(--accent);
    margin: 0;
    flex: 1;
  }
  .card-badge {
    padding: 4px 10px;
    background: rgba(247, 129, 102, 0.15);
    color: var(--accent);
    border-radius: 6px;
    font-size: 0.72em;
    font-weight: 600;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .card-badge.green { background: rgba(126, 231, 135, 0.2); color: var(--green); }
  .card-badge.red { background: rgba(248, 81, 73, 0.2); color: var(--red); }
  .card-badge.blue { background: rgba(121, 192, 255, 0.2); color: var(--blue); }
  .card-badge.purple { background: rgba(210, 168, 255, 0.2); color: var(--purple); }
  .card-label {
    color: var(--text-dim);
    font-size: 0.78em;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 12px;
    display: block;
    font-weight: 600;
  }
  .card-text { color: #c9d1d9; margin: 6px 0; font-size: 0.92em; }
  .legal-ref {
    font-family: 'Consolas', 'Courier New', monospace;
    color: var(--blue);
    font-size: 0.82em;
    display: block;
    margin-top: 10px;
    font-weight: 600;
    padding: 6px 10px;
    background: rgba(121, 192, 255, 0.08);
    border-radius: 4px;
  }
  .critical-warning {
    background: rgba(248, 81, 73, 0.1);
    border-left: 4px solid var(--red);
    padding: 10px 12px;
    margin: 10px 0;
    border-radius: 4px;
    color: var(--red);
    font-weight: 600;
    font-size: 0.9em;
  }
  .warning {
    background: rgba(255, 193, 7, 0.1);
    border-left: 4px solid var(--yellow);
    padding: 10px 12px;
    margin: 10px 0;
    border-radius: 4px;
    color: var(--yellow);
    font-weight: 600;
    font-size: 0.9em;
  }
  .info-box {
    background: rgba(121, 192, 255, 0.1);
    border-left: 4px solid var(--blue);
    padding: 10px 12px;
    margin: 10px 0;
    border-radius: 4px;
    color: var(--blue);
    font-size: 0.9em;
  }
  .ok-box {
    background: rgba(126, 231, 135, 0.1);
    border-left: 4px solid var(--green);
    padding: 10px 12px;
    margin: 10px 0;
    border-radius: 4px;
    color: var(--green);
    font-size: 0.9em;
  }
  .section-title {
    font-size: 20px;
    color: var(--accent);
    margin-bottom: 15px;
    padding-bottom: 10px;
    border-bottom: 2px solid var(--border);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .info-banner {
    background: linear-gradient(135deg, rgba(247, 129, 102, 0.1), rgba(210, 168, 255, 0.1));
    border: 1px solid var(--accent);
    border-radius: 12px;
    padding: 18px;
    margin-bottom: 20px;
  }
  .info-banner h2 { color: var(--accent); margin-bottom: 8px; font-size: 18px; }
  .hierarchy {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
    font-family: 'Consolas', monospace;
    font-size: 13px;
    white-space: pre-wrap;
    line-height: 1.5;
    margin-bottom: 15px;
    color: #c9d1d9;
  }
  .law-table {
    width: 100%;
    border-collapse: collapse;
    background: var(--bg-2);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 15px;
    border: 1px solid var(--border);
  }
  .law-table th {
    background: var(--bg-3);
    padding: 12px;
    text-align: left;
    color: var(--accent);
    font-weight: 600;
    text-transform: uppercase;
    font-size: 0.82em;
  }
  .law-table td {
    padding: 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  .law-table tr:hover { background: var(--bg-3); }
  .law-tag {
    display: inline-block;
    padding: 3px 8px;
    background: rgba(121, 192, 255, 0.15);
    border: 1px solid var(--blue);
    border-radius: 4px;
    font-size: 12px;
    font-family: 'Consolas', monospace;
    color: var(--blue);
    margin-right: 4px;
  }
  .filter-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .filter-chip {
    padding: 8px 16px;
    background: var(--bg-3);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
    font-weight: 500;
  }
  .filter-chip:hover { background: var(--border); transform: translateY(-2px); }
  .filter-chip.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
    box-shadow: 0 4px 12px rgba(247, 129, 102, 0.3);
  }
  .blank-card {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 15px;
    overflow: hidden;
    transition: all 0.2s;
  }
  .blank-card:hover { border-color: var(--accent); }
  .blank-header {
    padding: 14px 18px;
    background: var(--bg-3);
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }
  .blank-header h4 { color: var(--text); font-size: 15px; flex: 1; }
  .blank-status {
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
  }
  .status-green-bg { background: var(--green); color: #000; }
  .status-yellow-bg { background: var(--yellow); color: #000; }
  .status-red-bg { background: var(--red); color: white; }
  .blank-body { padding: 18px; display: none; }
  .blank-body.open { display: block; }
  .blank-form {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 15px;
  }
  .blank-form label {
    display: block;
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }
  .blank-form input, .blank-form select, .blank-form textarea {
    width: 100%;
    padding: 8px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 14px;
    outline: none;
  }
  .blank-form input:focus { border-color: var(--accent); }
  .blank-preview {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px;
    font-family: 'Consolas', 'Courier New', monospace;
    font-size: 13px;
    white-space: pre-wrap;
    line-height: 1.5;
    margin-bottom: 10px;
    max-height: 400px;
    overflow-y: auto;
  }
  .btn {
    padding: 10px 18px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    transition: all 0.2s;
    margin-right: 8px;
    margin-bottom: 8px;
  }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: #e66a50; }
  .btn-secondary { background: var(--bg-3); color: var(--text); border: 1px solid var(--border); }
  .btn-copy { background: var(--green); color: #000; }
  .checklist {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 15px;
    margin-bottom: 12px;
  }
  .checklist h4 { color: var(--green); margin-bottom: 10px; font-size: 15px; }
  .check-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }
  .check-item:last-child { border-bottom: none; }
  .check-item input[type="checkbox"] { margin-top: 3px; width: 18px; height: 18px; cursor: pointer; }
  .check-item.checked label { text-decoration: line-through; color: var(--text-dim); }
  .copy-toast {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: var(--green);
    color: #000;
    padding: 12px 24px;
    border-radius: 8px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.3s;
    z-index: 1000;
    font-weight: 600;
  }
  .copy-toast.show { opacity: 1; transform: translateY(0); }
  .highlight { background: rgba(255, 193, 7, 0.35); padding: 0 2px; border-radius: 2px; }
  footer {
    max-width: 1400px;
    margin: 40px auto 20px;
    padding: 20px;
    text-align: center;
    color: var(--text-dim);
    font-size: 13px;
    border-top: 1px solid var(--border);
  }
  @media (max-width: 768px) {
    .cards-grid { grid-template-columns: 1fr; }
    .blank-form { grid-template-columns: 1fr; }
    h1 { font-size: 18px; }
    .faction-btn { padding: 7px 10px; font-size: 12px; }
  }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: var(--bg-2); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px; }
  ::-webkit-scrollbar-thumb:hover { background: #484f58; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <h1>⚖️ СПРАВОЧНИК СИЛОВЫХ СТРУКТУР <small>v2.0 | RP-Проект</small></h1>
    <div class="search-box">
      <input type="text" id="globalSearch" placeholder="🔍 Поиск по статьям, законам, процедурам, бланкам...">
      <div class="mode-switch">
        <button class="mode-btn active" data-mode="criminal">Уголовный</button>
        <button class="mode-btn" data-mode="admin">Админ</button>
        <button class="mode-btn" data-mode="civil">Гражданский</button>
      </div>
    </div>
    <div class="factions-nav" id="factionsNav"></div>
  </div>
</header>

<main>
  <div id="searchResults"></div>
  <div id="mainContent">
    <div class="tabs" id="tabsNav"></div>
    <div id="tabContent"></div>
  </div>
</main>

<footer>
  <p>© 2026 справочник RP-проекта | Актуально на июнь 2026 г.</p>
  <p style="margin-top:8px; font-size:11px; opacity:0.7;">Нарушение процессуальных норм (ст. 75 УПК РФ) влечет признание доказательств недопустимыми</p>
</footer>

<div class="copy-toast" id="copyToast">✅ Скопировано в буфер!</div>

В течение 24 часов уведомить прокурора (если причинен вред).
Подпись: Сотрудник, командир подразделения.` },
  28: { title: 'Протокол доставления', faction: 'rosgvardia', status: 'green', fields: ['fio', 'otkuda', 'vremya'], template: `[95137095225927]
ПРОТОКОЛ ДОСТАВЛЕНИЯ (ст. 27.2 КоАП РФ)
Доставлен: {{fio}} | Откуда: {{otkuda}}
Куда: ОВД / Росгвардия | Время: {{vremya}}
Основания: для составления протокола об адм. правонарушении на месте составить невозможно.
Подпись: Сотрудник Росгвардии.` },
  29: { title: 'Постановление о водворении в ШИЗО', faction: 'fsin', status: 'yellow', fields: ['fio', 'opisanie'], template: `[ФСИН / ИУ / СИЗО]
ПОСТАНОВЛЕНИЕ (ст. 115 УИК РФ / ст. 36 ФЗ №103)
Заключённый: {{fio}}
Основание: злостное нарушение режима: {{opisanie}}.
Водворить в ШИЗО на срок до 15 суток.
Перед водворением — мед. осмотр [109568906453766].
Подпись: Начальник ИУ / СИЗО.` },
  30: { title: 'Протокол личного обыска в СИЗО/ИК', faction: 'fsin', status: 'green', fields: ['fio', 'kamera', 'izyato'], template: `[ФСИН / ИУ / СИЗО]
ПРОТОКОЛ ЛИЧНОГО ОБЫСКА (ст. 82 УИК РФ, ПВР Приказ Минюста №492)
Обыскан: {{fio}} | Место: Камера №{{kamera}}
Основание: плановый шмон / оперативная информация.
Обязательно: 2 понятых. Опись изъятых запрещённых предметов: {{izyato}}.
Подпись: Сотрудник ФСИН | Понятые | Обысканный.` }
};

// ============ UI ============
const factionsNav = document.getElementById('factionsNav');
const tabsNav = document.getElementById('tabsNav');
const tabContent = document.getElementById('tabContent');
const mainContent = document.getElementById('mainContent');
const searchResults = document.getElementById('searchResults');
const globalSearch = document.getElementById('globalSearch');
const copyToast = document.getElementById('copyToast');

let currentFaction = 'mvd';
let currentTab = 'powers';
let currentFilter = 'all';

// Навигация по фракциям
Object.values(FACTIONS).forEach((f, i) => {
  const btn = document.createElement('button');
  btn.className = 'faction-btn' + (i === 0 ? ' active' : '');
  btn.dataset.faction = f.id;
  btn.innerHTML = `<span>${f.icon}</span><span>${f.name}</span>`;
  btn.onclick = () => selectFaction(f.id);
  factionsNav.appendChild(btn);
});

function selectFaction(id) {
  currentFaction = id;
  currentTab = 'powers';
  currentFilter = 'all';
  document.querySelectorAll('.faction-btn').forEach(b => b.classList.toggle('active', b.dataset.faction === id));
  renderTabs();
  renderTab();
  searchResults.innerHTML = '';
  globalSearch.value = '';
}

// Вкладки
const TABS = [
  { id: 'powers', name: '⚖️ Полномочия' },
  { id: 'procedures', name: '🔍 Процедуры' },
  { id: 'violations', name: '⚠️ Нарушения' },
  { id: 'structure', name: '🏢 Структура' },
  { id: 'laws', name: '📜 Законы' },
  { id: 'checklists', name: '✅ Требования' },
  { id: 'errors', name: '🚫 Ошибки' },
  { id: 'interactions', name: '🤝 Взаимодействие' },
  { id: 'blanks', name: '📑 Бланки' }
];

function renderTabs() {
  tabsNav.innerHTML = '';
  TABS.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (t.id === currentTab ? ' active' : '');
    btn.textContent = t.name;
    btn.onclick = () => {
      currentTab = t.id;
      currentFilter = 'all';
      document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderTab();
    };
    tabsNav.appendChild(btn);
  });
}

function renderTab() {
  const f = FACTIONS[currentFaction];
  let html = '';
  
  if (currentTab === 'structure') {
    html = `
      <div class="section-title">🏢 ${f.name} — Структура</div>
      <div class="info-banner">
        <h2>${f.icon} ${f.name}</h2>
        <p>Иерархия подразделений и командования</p>
      </div>
      <div class="hierarchy">${f.structure}</div>
    `;
  } else if (currentTab === 'laws') {
    html = `<div class="section-title">📜 Правовая база — ${f.name}</div>
      <table class="law-table">
        <thead><tr><th>Номер</th><th>Название</th><th>Дата</th></tr></thead>
        <tbody>`;
    f.laws.forEach(l => {
      html += `<tr>
        <td><span class="law-tag">${l.num}</span></td>
        <td>${l.name}</td>
        <td style="color:var(--text-dim)">${l.date}</td>
      </tr>`;
    });
    html += `</tbody></table>`;
  } else if (currentTab === 'powers') {
    html = `<div class="section-title">⚖️ Полномочия — ${f.name}</div>`;
    // Фильтры по категориям
    const categories = ['all', ...new Set(f.powers.map(p => p.category))];
    const categoryLabels = { all: 'Все', docs: '📄 Документы', force: '🔫 Применение силы', search: '🔎 Обыск/Досмотр', ord: '🕵️ ОРД' };
    html += `<div class="filter-bar">`;
    categories.forEach(c => {
      html += `<button class="filter-chip ${currentFilter === c ? 'active' : ''}" onclick="setFilter('${c}')">${categoryLabels[c] || c}</button>`;
    });
    html += `</div>`;
    html += `<div class="cards-grid">`;
    f.powers.filter(p => currentFilter === 'all' || p.category === currentFilter).forEach(p => {
      html += `<div class="card">
        <div class="card-header">
          <h3 class="card-title">${p.title}</h3>
          <span class="card-badge ${p.badgeColor}">${p.badge}</span>
        </div>
        <div class="card-content">${p.content}</div>
      </div>`;
    });
    html += `</div>`;
  } else if (currentTab === 'procedures') {
    html = `<div class="section-title">🔍 Процедуры и следственные действия — ${f.name}</div>`;
    html += `<div class="cards-grid">`;
    f.procedures.forEach(p => {
      html += `<div class="card">
        <div class="card-header">
          <h3 class="card-title">${p.title}</h3>
          <span class="card-badge ${p.badgeColor}">${p.badge}</span>
        </div>
        <div class="card-content">${p.content}</div>
      </div>`;
    });
    html += `</div>`;
  } else if (currentTab === 'violations') {
    html = `<div class="section-title">⚠️ Уголовная и дисциплинарная ответственность сотрудников — ${f.name}</div>`;
    f.violations.forEach(v => {
      html += `<div class="card" style="border-left: 4px solid ${v.severity === 'critical' ? 'var(--red)' : 'var(--yellow)'};">
        <div class="card-header">
          <h3 class="card-title">${v.title}</h3>
          <span class="card-badge ${v.severity === 'critical' ? 'red' : 'yellow'}">${v.article}</span>
        </div>
        <div class="card-content">
          <p class="card-text"><strong>Состав:</strong> ${v.text}</p>
          <div class="critical-warning"><strong>Наказание:</strong> ${v.punishment}</div>
        </div>
      </div>`;
    });
  } else if (currentTab === 'checklists') {
    html = `<div class="section-title">✅ Требования — ${f.name}</div>`;
    f.checklists.forEach((cl, idx) => {
      html += `<div class="checklist"><h4>${cl.title}</h4>`;
      cl.items.forEach((item, i) => {
        const key = `${currentFaction}_${idx}_${i}`;
        const checked = localStorage.getItem('check_' + key) === '1';
        html += `<div class="check-item ${checked ? 'checked' : ''}">
          <input type="checkbox" id="check_${key}" ${checked ? 'checked' : ''} onchange="toggleCheck('${key}', this)">
          <label for="check_${key}">${item}</label>
        </div>`;
      });
      html += `</div>`;
    });
  } else if (currentTab === 'errors') {
    html = `<div class="section-title">🚫 Типичные ошибки — ${f.name}</div>`;
    f.errors.forEach(e => {
      html += `<div class="critical-warning"><strong>❌ ${e.text}</strong></div>`;
    });
  } else if (currentTab === 'interactions') {
    html = `<div class="section-title">🤝 Взаимодействие — ${f.name}</div>
      <div class="cards-grid">`;
    f.interactions.forEach(i => {
      const targetFaction = Object.values(FACTIONS).find(f => f.name.toLowerCase().includes(i.target.toLowerCase()) || f.id === i.target.toLowerCase());
      html += `<div class="card">
        <div class="card-header">
          <h3 class="card-title">${targetFaction ? targetFaction.icon : '🏢'} ${i.target}</h3>
        </div>
        <div class="card-content">
          <p class="card-text">${i.reason}</p>
          ${targetFaction ? `<button class="btn btn-primary" style="margin-top:10px" onclick="selectFaction('${targetFaction.id}')">Перейти →</button>` : ''}
        </div>
      </div>`;
    });
    html += `</div>`;
  } else if (currentTab === 'blanks') {
    html = `<div class="section-title">📑 Процессуальные бланки — ${f.name}</div>`;
    f.blanks.forEach(bId => {
      const b = BLANKS[bId];
      const statusCls = b.status === 'green' ? 'status-green-bg' : b.status === 'red' ? 'status-red-bg' : 'status-yellow-bg';
      const statusTxt = b.status === 'green' ? 'Самостоятельно' : b.status === 'red' ? 'Решение суда' : 'Руководитель';
      html += `<div class="blank-card">
        <div class="blank-header" onclick="toggleBlank(${bId})">
          <h4>📋 ${b.title}</h4>
          <span class="blank-status ${statusCls}">${statusTxt}</span>
        </div>
        <div class="blank-body" id="blank_body_${bId}">
          <div class="blank-form">`;
      b.fields.forEach(field => {
        html += `<div><label>${getFieldLabel(field)}</label><input type="text" id="field_${bId}_${field}" placeholder="..." oninput="updateBlankPreview(${bId})"></div>`;
      });
      html += `</div>
          <div class="blank-preview" id="preview_${bId}">${renderTemplate(b.template, bId)}</div>
          <button class="btn btn-copy" onclick="copyBlank(${bId})">📋 Скопировать</button>
          <button class="btn btn-secondary" onclick="clearBlank(${bId})">🗑 Очистить</button>
        </div>
      </div>`;
    });
  }
  
  tabContent.innerHTML = html;
}

function setFilter(c) {
  currentFilter = c;
  renderTab();
}

function getFieldLabel(f) {
  const labels = {
    nomer: 'Номер', sutmrm: 'Суть ОРМ', fio: 'ФИО', osnov: 'Основание',
    number: 'Номер телефона', srok: 'Срок (суток)', statya: 'Статья УК',
    podr: 'Подразделение', nazv: 'Название ОРМ', data: 'Дата',
    adres: 'Адрес', datavremya: 'Дата и время', status: 'Статус',
    vremya: 'Время', mesto: 'Место', sotr: 'Сотрудник (звание, ФИО)',
    spisok: 'Список изъятых предметов', opisanie: 'Описание', ponyatye: 'Понятые (ФИО)',
    sudya: 'Судья', adresat: 'Адресат', narush: 'Описание нарушений',
    reestr: 'Реестровый номер', doveritel: 'Доверитель', perechen: 'Перечень',
    sud: 'Название суда', fio_sled: 'ФИО следователя', deystvie: 'Действие',
    komandir: 'Командир части', zvaniye: 'Звание', zashch: 'Подзащитный',
    primenen: 'Что применено', rezultat: 'Результат', otkuda: 'Откуда',
    kamera: 'Камера', izyato: 'Изъято'
  };
  return labels[f] || f;
}

function toggleBlank(id) {
  const body = document.getElementById('blank_body_' + id);
  body.classList.toggle('open');
}

function renderTemplate(template, bId) {
  let result = template;
  const b = BLANKS[bId];
  b.fields.forEach(f => {
    const input = document.getElementById(`field_${bId}_${f}`);
    const val = input ? input.value || `[${getFieldLabel(f)}]` : `[${getFieldLabel(f)}]`;
    result = result.replace(new RegExp(`\\{\\{${f}\\}\\}`, 'g'), val);
  });
  return result;
}

function updateBlankPreview(bId) {
  const preview = document.getElementById('preview_' + bId);
  preview.textContent = renderTemplate(BLANKS[bId].template, bId);
}

function copyBlank(bId) {
  const preview = document.getElementById('preview_' + bId);
  navigator.clipboard.writeText(preview.textContent).then(() => {
    showToast('✅ Скопировано в буфер!');
  });
}

function clearBlank(bId) {
  const b = BLANKS[bId];
  b.fields.forEach(f => {
    const input = document.getElementById(`field_${bId}_${f}`);
    if (input) input.value = '';
  });
  updateBlankPreview(bId);
}

function toggleCheck(key, cb) {
  if (cb.checked) localStorage.setItem('check_' + key, '1');
  else localStorage.removeItem('check_' + key);
  cb.parentElement.classList.toggle('checked', cb.checked);
}

function showToast(msg) {
  copyToast.textContent = msg;
  copyToast.classList.add('show');
  setTimeout(() => copyToast.classList.remove('show'), 2500);
}

// Глобальный поиск
globalSearch.addEventListener('input', (e) => {
  const q = e.target.value.toLowerCase().trim();
  if (!q) {
    searchResults.innerHTML = '';
    mainContent.style.display = 'block';
    return;
  }
  mainContent.style.display = 'none';
  let results = [];
  
  Object.values(FACTIONS).forEach(f => {
    if (f.name.toLowerCase().includes(q)) {
      results.push({ type: 'faction', faction: f, text: f.name });
    }
    f.laws.forEach(l => {
      if ((l.num + ' ' + l.name).toLowerCase().includes(q)) {
        results.push({ type: 'law', faction: f, law: l, text: `${l.num} ${l.name}` });
      }
    });
    f.powers.forEach(p => {
      if (p.title.toLowerCase().includes(q) || p.content.toLowerCase().includes(q)) {
        results.push({ type: 'power', faction: f, text: p.title, content: p.content });
      }
    });
    f.procedures.forEach(p => {
      if (p.title.toLowerCase().includes(q) || p.content.toLowerCase().includes(q)) {
        results.push({ type: 'procedure', faction: f, text: p.title, content: p.content });
      }
    });
    f.violations.forEach(v => {
      if ((v.title + ' ' + v.text).toLowerCase().includes(q)) {
        results.push({ type: 'violation', faction: f, text: `${v.title} — ${v.article}` });
      }
    });
    f.errors.forEach(err => {
      if (err.text.toLowerCase().includes(q)) {
        results.push({ type: 'error', faction: f, text: err.text });
      }
    });
  });
  
  Object.entries(BLANKS).forEach(([id, b]) => {
    if (b.title.toLowerCase().includes(q) || b.template.toLowerCase().includes(q)) {
      const faction = Object.values(FACTIONS).find(f => f.blanks.includes(parseInt(id)));
      results.push({ type: 'blank', blank: b, id, faction, text: b.title });
    }
  });
  
  if (results.length === 0) {
    searchResults.innerHTML = `<div class="info-banner"><h2>🔍 Ничего не найдено</h2><p>Попробуйте изменить запрос</p></div>`;
    return;
  }
  
  let html = `<div class="section-title">🔍 Результаты: "${e.target.value}" (${results.length})</div>`;
  html += `<div class="cards-grid">`;
  results.slice(0, 30).forEach(r => {
    let cardContent = '';
    let onClick = '';
    if (r.type === 'faction') {
      cardContent = `<p class="card-text">Перейти к фракции →</p>`;
      onClick = `selectFaction('${r.faction.id}')`;
    } else if (r.type === 'law') {
      cardContent = `<p class="card-text">${r.faction.icon} ${r.faction.name} ${r.law.date ? '| ' + r.law.date : ''}</p>`;
      onClick = `selectFaction('${r.faction.id}'); currentTab='laws'; renderTabs(); renderTab();`;
    } else if (r.type === 'power' || r.type === 'procedure') {
      cardContent = `<p class="card-text">${r.faction.icon} ${r.faction.name}</p>`;
      onClick = `selectFaction('${r.faction.id}'); currentTab='${r.type === 'power' ? 'powers' : 'procedures'}'; renderTabs(); renderTab();`;
    } else if (r.type === 'violation') {
      cardContent = `<p class="card-text">${r.faction.icon} ${r.faction.name}</p>`;
      onClick = `selectFaction('${r.faction.id}'); currentTab='violations'; renderTabs(); renderTab();`;
    } else if (r.type === 'error') {
      cardContent = `<p class="card-text">${r.faction.icon} ${r.faction.name}</p>`;
      onClick = `selectFaction('${r.faction.id}'); currentTab='errors'; renderTabs(); renderTab();`;
    } else if (r.type === 'blank') {
      cardContent = `<p class="card-text">${r.faction.icon} ${r.faction.name}</p>`;
      onClick = `selectFaction('${r.faction.id}'); currentTab='blanks'; renderTabs(); renderTab(); setTimeout(()=>{const body=document.getElementById('blank_body_${r.id}'); if(body) body.classList.add('open');},100)`;
    }
    const icon = r.type === 'law' ? '📜' : r.type === 'power' ? '⚖️' : r.type === 'procedure' ? '🔍' : r.type === 'violation' ? '⚠️' : r.type === 'blank' ? '📋' : r.type === 'error' ? '❌' : r.faction.icon;
    html += `<div class="card" style="cursor:pointer" onclick="${onClick}">
      <div class="card-header">
        <h3 class="card-title">${icon} ${highlightText(r.text, q)}</h3>
      </div>
      <div class="card-content">${cardContent}</div>
    </div>`;
  });
  html += `</div>`;
  searchResults.innerHTML = html;
});

function highlightText(text, q) {
  const regex = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
  return text.replace(regex, '<span class="highlight">$1</span>');
}

// Инициализация
selectFaction('mvd');
</script>
</body>
</html>
